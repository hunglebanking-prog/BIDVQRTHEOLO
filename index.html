<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Thu hộ tiền ăn Tiền SHP</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>
body{
font-family:Arial;
margin:0;
background:#f3f3f3;
}
.header{
background:#0b6b5c;
color:white;
text-align:center;
padding:25px;
}
.contact{
color:yellow;
font-weight:bold;
}
.container{
padding:20px;
text-align:center;
}
.qr-grid{
display:grid;
grid-template-columns:repeat(auto-fill,220px);
gap:20px;
justify-content:center;
}
.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}
.qr{
width:180px;
}
.bigButton{
font-size:22px;
padding:15px 35px;
background:#0b6b5c;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="header">
<h2>Thu hộ tiền ăn, Tiền SHP Trường TH và THCS Chu Văn An</h2>
<div class="contact">
Lê Mạnh Hùng - PGD Đông Hà - ĐT: 0914.179.989
</div>
</div>

<div class="container">

<input type="file" id="upload" accept=".xlsx">
<br><br>

<h3>Lọc theo lớp</h3>
<select id="classFilter">
<option value="">Tất cả lớp</option>
</select>

<button onclick="applyFilter()">Lọc</button>
<button onclick="downloadClassQR()">Tải QR lớp đã chọn</button>

<br><br>
<input type="text" id="search" placeholder="Tìm tên / mã học sinh" onkeyup="applyFilter()">

<br><br>
<div id="qrContainer" class="qr-grid"></div>

<br><br>
<button onclick="downloadAll()" class="bigButton">
Tải toàn bộ QR
</button>

</div>

<script>
let students=[]
let qrImages=[]

window.onload=function(){
loadExcelFile("data.xlsx")
}

async function loadExcelFile(file){
try{
const response=await fetch(file)
const data=await response.arrayBuffer()
const workbook=XLSX.read(data,{type:"array"})
const sheet=workbook.Sheets[workbook.SheetNames[0]]
students=XLSX.utils.sheet_to_json(sheet)
render()
}catch(e){
console.log("Chưa có file data.xlsx")
}
}

document.getElementById("upload").addEventListener("change",function(e){
const reader=new FileReader()
reader.onload=function(evt){
const data=new Uint8Array(evt.target.result)
const workbook=XLSX.read(data,{type:"array"})
const sheet=workbook.Sheets[workbook.SheetNames[0]]
students=XLSX.utils.sheet_to_json(sheet)
render()
}
reader.readAsArrayBuffer(e.target.files[0])
})

function render(){
const container=document.getElementById("qrContainer")
container.innerHTML=""
qrImages=[]
students.forEach((s,index)=>{
const bank=(s.Bank||"").toLowerCase()
const account=s.AccountNumber||""
const amount=s.Amount||0
const remark=encodeURIComponent(s.Remark||"")
const qr=`https://img.vietqr.io/image/${bank}-${account}-compact2.png?amount=${amount}&addInfo=${remark}`

const card=document.createElement("div")
card.className="card"
card.dataset.class=s.Class
card.dataset.name=(s.AccountName+" "+s.StudentID).toLowerCase()

card.innerHTML=`
<b>${s.AccountName}</b><br>
Lớp: ${s.Class}<br>
Mã HS: ${s.StudentID}<br>
Số tiền: ${Number(amount).toLocaleString()} VND
<br><br>
<img src="${qr}" class="qr">
<br><br>
<button onclick="downloadSingle(${index})">Tải QR</button>
`
container.appendChild(card)

// Lưu object với đầy đủ thông tin để vẽ lên QR
qrImages.push({
url: qr,
name: s.AccountName,
class: s.Class,
StudentID: s.StudentID,
AccountNumber: account,
Amount: amount
})

})
buildClassFilter()
}

function buildClassFilter(){
const classes=[...new Set(students.map(s=>s.Class))]
const select=document.getElementById("classFilter")
select.innerHTML='<option value="">Tất cả lớp</option>'
classes.forEach(c=>{
const op=document.createElement("option")
op.value=c
op.textContent=c
select.appendChild(op)
})
}

function applyFilter(){
const selected=document.getElementById("classFilter").value
const text=document.getElementById("search").value.toLowerCase()
const cards=document.querySelectorAll(".card")
cards.forEach(card=>{
const matchClass = selected=="" || card.dataset.class==selected
const matchText = card.dataset.name.includes(text)
card.style.display=(matchClass && matchText)?"block":"none"
})
}

// Vẽ QR + thông tin Họ Tên, Lớp, Số tài khoản, Số tiền
async function createStyledQR(item){
const res=await fetch(item.url)
const blob=await res.blob()
const img=await createImageBitmap(blob)
const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")
canvas.width=img.width
canvas.height=img.height+80
ctx.fillStyle="#f1f1f1"
ctx.fillRect(0,0,canvas.width,canvas.height)
ctx.drawImage(img,0,0)
ctx.fillStyle="#000"
ctx.textAlign="center"
ctx.font="bold 16px Arial"
ctx.fillText(item.name, canvas.width/2, img.height+20)
ctx.font="14px Arial"
ctx.fillText("Lớp: "+item.class, canvas.width/2, img.height+40)
ctx.fillText("Số TK: "+item.AccountNumber, canvas.width/2, img.height+60)
ctx.fillText("Số tiền: "+Number(item.Amount).toLocaleString()+" VND", canvas.width/2, img.height+80)
return new Promise(resolve=>canvas.toBlob(resolve,"image/png"))
}

// Tải 1 QR
async function downloadSingle(index){
const item=qrImages[index]
const blob=await createStyledQR(item)
saveAs(blob, item.class+"_"+item.StudentID+"_"+item.name+".png")
}

// Tải theo lớp
async function downloadClassQR(){
const selected=document.getElementById("classFilter").value
if(selected==""){alert("Vui lòng chọn lớp"); return}
const zip=new JSZip()
const concurrency=5
let index=0
async function worker(){
while(index<qrImages.length){
const i=index++
const item=qrImages[i]
if(item.class!=selected) continue
const blob=await createStyledQR(item)
zip.file(item.class+"_"+item.StudentID+"_"+item.name+".png",blob)
}
}
await Promise.all(Array(concurrency).fill().map(worker))
const content=await zip.generateAsync({type:"blob"})
saveAs(content,"QR_LOP_"+selected+".zip")
}

// Tải tất cả QR
async function downloadAll(){
const zip=new JSZip()
const concurrency=5
let index=0
async function worker(){
while(index<qrImages.length){
const i=index++
const item=qrImages[i]
const blob=await createStyledQR(item)
zip.file(item.class+"_"+item.StudentID+"_"+item.name+".png",blob)
}
}
await Promise.all(Array(concurrency).fill().map(worker))
const content=await zip.generateAsync({type:"blob"})
saveAs(content,"QR_HOCSINH.zip")
}
</script>
</body>
</html>
