<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tạo QR BIDV hàng loạt</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<style>

body{
font-family:Arial;
padding:30px;
background:#f4f6f8;
}

h1{
color:#0066b3;
}

.qr{
background:white;
padding:15px;
margin:10px;
display:inline-block;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

img{
width:200px;
}

</style>

</head>

<body>

<h1>Tạo QR BIDV theo lô</h1>

<input type="file" id="fileInput">

<div id="qrContainer"></div>

<script>

document.getElementById("fileInput").addEventListener("change",function(e){

const file=e.target.files[0];

Papa.parse(file,{
header:true,
complete:function(results){

let data=results.data;

let container=document.getElementById("qrContainer");

container.innerHTML="";

data.forEach(row=>{

if(!row.stk) return;

let url=`https://img.vietqr.io/image/BIDV-${row.stk}-compact2.png?amount=${row.sotien}&addInfo=${encodeURIComponent(row.noidung)}&accountName=${encodeURIComponent(row.ten)}`;

let div=document.createElement("div");

div.className="qr";

div.innerHTML=`

<p><b>${row.ten}</b></p>

<img src="${url}">

<br><br>

<a href="${url}" download>Tải QR</a>

`;

container.appendChild(div);

});

}

});

});

</script>

</body>
</html>
