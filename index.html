<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<title>QR thu hộ Trường học</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f3f3;
}

.header{

background:linear-gradient(90deg,#0c7c6a,#0f9a8a);
color:white;
padding:40px;
text-align:center;

}

.header h1{
margin:0;
font-size:32px;
}

.header p{
font-size:18px;
margin-top:10px;
}

.contact{

margin-top:10px;
font-size:17px;
color:yellow;
font-weight:bold;

}

.container{

padding:40px;
text-align:center;

}

input[type=file]{

padding:10px;
font-size:16px;

}

.search{

margin-left:20px;
padding:10px;
font-size:16px;
width:350px;
border-radius:8px;
border:1px solid #ccc;

}

.downloadAll{

margin-left:20px;
padding:10px 15px;
font-size:16px;
background:#0c7c6a;
color:white;
border:none;
border-radius:8px;
cursor:pointer;

}

.qr{

display:inline-block;
background:white;
padding:15px;
margin:10px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);

}

.qr img{

width:200px;

}

</style>

</head>

<body>

<div class="header">

<h1>PGD ĐÔNG HÀ - BIDV QUẢNG TRỊ - QR thu hộ Trường học</h1>

<p>Tải file Excel để tạo QR thanh toán, tìm kiếm thông tin học sinh để thanh toán các khoản phí</p>

<div class="contact">
Lê Mạnh Hùng - PGD Đông Hà - ĐT: 0914.179.989
</div>

</div>

<div class="container">

<input type="file" id="fileInput">

<input class="search" type="text" id="search" placeholder="🔍 Tìm theo AccountName / AccountNumber / StudentID">

<button class="downloadAll" onclick="downloadAll()">Tải toàn bộ QR (ZIP)</button>

<div id="qrContainer"></div>

</div>

<script>

let data=[];

document.getElementById("fileInput").addEventListener("change",function(e){

const file=e.target.files[0];
const reader=new FileReader();

reader.onload=function(e){

const workbook=XLSX.read(e.target.result,{type:'binary'});
const sheet=workbook.Sheets[workbook.SheetNames[0]];
data=XLSX.utils.sheet_to_json(sheet);

render(data);

};

reader.readAsBinaryString(file);

});

function createQR(row){

return `https://img.vietqr.io/image/BIDV-${row.AccountNumber}-compact2.png?amount=${row.Amount}&addInfo=${encodeURIComponent(row.Remark)}&accountName=${encodeURIComponent(row.AccountName)}`;

}

function render(rows){

let container=document.getElementById("qrContainer");

container.innerHTML="";

rows.forEach(row=>{

let qr=createQR(row);

let div=document.createElement("div");

div.className="qr";

div.innerHTML=`

<b>${row.AccountName}</b><br>

${row.Class} - ${row.StudentID}<br><br>

<img src="${qr}"><br><br>

<a href="${qr}" download="${row.Class}_${row.StudentID}.png">
Tải QR
</a>

`;

container.appendChild(div);

});

}

document.getElementById("search").addEventListener("keyup",function(){

let keyword=this.value.toLowerCase();

let filtered=data.filter(r=>{

return(

String(r.AccountName).toLowerCase().includes(keyword) ||

String(r.AccountNumber).toLowerCase().includes(keyword) ||

String(r.StudentID).toLowerCase().includes(keyword)

);

});

render(filtered);

});

async function downloadAll(){

const zip=new JSZip();

for(let row of data){

let url=createQR(row);

let response=await fetch(url);

let blob=await response.blob();

let filename=`${row.Class}_${row.StudentID}.png`;

zip.file(filename,blob);

}

zip.generateAsync({type:"blob"}).then(function(content){

saveAs(content,"QR_HOC_SINH.zip");

});

}

</script>

</body>

</html>
