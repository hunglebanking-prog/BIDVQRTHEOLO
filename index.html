<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Tạo QR BIDV theo lô</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
padding:30px;
background:#f4f6f8;
}

h1{
color:#0a5aa1;
}

.qr{
background:white;
padding:15px;
margin:10px;
display:inline-block;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
text-align:center;
}

img{
width:200px;
}

</style>

</head>

<body>

<h1>Tạo QR BIDV theo lô</h1>

<input type="file" id="fileInput">

<div id="qrContainer"></div>

<script>

document.getElementById("fileInput").addEventListener("change",function(e){

const file = e.target.files[0];

const reader = new FileReader();

reader.onload = function(e){

const data = new Uint8Array(e.target.result);

const workbook = XLSX.read(data,{type:'array'});

const sheet = workbook.Sheets[workbook.SheetNames[0]];

const rows = XLSX.utils.sheet_to_json(sheet,{defval:""});

let container=document.getElementById("qrContainer");

container.innerHTML="";

rows.forEach(row=>{

let account=row["AccountNumber"];
let amount=row["Amount"];
let name=row["AccountName"];
let remark=row["Remark"];
let className=row["Class"];
let studentID=row["StudentID"];

if(account=="") return;

let qr=`https://img.vietqr.io/image/BIDV-${account}-compact2.png?amount=${amount}&addInfo=${encodeURIComponent(remark)}&accountName=${encodeURIComponent(name)}`;

let fileName=`${className}_${studentID}.png`;

let div=document.createElement("div");

div.className="qr";

div.innerHTML=`

<p><b>${name}</b></p>
<p>${className} - ${studentID}</p>

<img src="${qr}">

<br><br>

<a href="${qr}" download="${fileName}">Tải QR</a>

`;

container.appendChild(div);

});

};

reader.readAsArrayBuffer(file);

});

</script>

</body>
</html>
