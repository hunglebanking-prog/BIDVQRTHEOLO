<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Thu hộ tiền ăn</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>
body{
font-family:Arial;
margin:0;
background:#f3f3f3;
}
.header{
background:#0b6b5c;
color:white;
text-align:center;
padding:20px;
}
.container{
padding:20px;
text-align:center;
}
.qr-grid{
display:grid;
grid-template-columns:repeat(auto-fill,220px);
gap:20px;
justify-content:center;
}
.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}
.qr{
width:180px;
}
button{
padding:8px 12px;
cursor:pointer;
}
.bigButton{
font-size:20px;
padding:15px 30px;
background:#0b6b5c;
color:white;
border:none;
border-radius:6px;
}
</style>

</head>

<body>

<div class="header">
<h2>Thu hộ tiền ăn</h2>
</div>

<div class="container">

<input type="file" id="upload" accept=".xlsx">
<br><br>

<select id="classFilter"></select>
<button onclick="applyFilter()">Lọc</button>
<button onclick="downloadClassQR()">Tải QR lớp</button>

<br><br>
<input type="text" id="search" placeholder="Tìm kiếm..." onkeyup="applyFilter()">

<br><br>
<div id="qrContainer" class="qr-grid"></div>

<br><br>
<button onclick="downloadAll()" class="bigButton">Tải toàn bộ QR</button>

</div>

<script>

let students=[]
let qrImages=[]
const qrCache=new Map()

// LOAD FILE
document.getElementById("upload").addEventListener("change",function(e){
const reader=new FileReader()
reader.onload=function(evt){
const data=new Uint8Array(evt.target.result)
const workbook=XLSX.read(data,{type:"array"})
const sheet=workbook.Sheets[workbook.SheetNames[0]]
students=XLSX.utils.sheet_to_json(sheet)
render()
}
reader.readAsArrayBuffer(e.target.files[0])
})

// RENDER
function render(){
const container=document.getElementById("qrContainer")
container.innerHTML=""
qrImages=[]

students.forEach((s,index)=>{

const bank=(s.Bank||"").toLowerCase()
const account=s.AccountNumber||""
const amount=s.Amount||0
const remark=encodeURIComponent(s.Remark||"")

const qr=`https://img.vietqr.io/image/${bank}-${account}-compact2.png?amount=${amount}&addInfo=${remark}`

const card=document.createElement("div")
card.className="card"
card.dataset.class=s.Class
card.dataset.name=(s.AccountName+" "+s.StudentID).toLowerCase()

card.innerHTML=`
<b>${s.AccountName}</b><br>
Lớp: ${s.Class}<br>
${Number(amount).toLocaleString()} VND
<br><br>
<img src="${qr}" class="qr">
<br><br>
<button onclick="downloadSingle(${index})">Tải QR</button>
`

container.appendChild(card)

qrImages.push({
url: qr,
name: s.AccountName,
class: s.Class,
StudentID: s.StudentID,
AccountNumber: account,
Amount: amount
})

})

buildClassFilter()
}

// FILTER
function buildClassFilter(){
const classes=[...new Set(students.map(s=>s.Class))]
const select=document.getElementById("classFilter")
select.innerHTML='<option value="">Tất cả lớp</option>'
classes.forEach(c=>{
const op=document.createElement("option")
op.value=c
op.textContent=c
select.appendChild(op)
})
}

function applyFilter(){
const selected=document.getElementById("classFilter").value
const text=document.getElementById("search").value.toLowerCase()

document.querySelectorAll(".card").forEach(card=>{
const ok1 = selected=="" || card.dataset.class==selected
const ok2 = card.dataset.name.includes(text)
card.style.display=(ok1&&ok2)?"block":"none"
})
}

// CACHE QR
async function fetchQR(url){
if(qrCache.has(url)) return qrCache.get(url)
const res=await fetch(url)
const blob=await res.blob()
qrCache.set(url,blob)
return blob
}

// ===== QR CHUẨN GIỐNG ẢNH =====
async function createStyledQR(item){

const blob = await fetchQR(item.url)
const qrImg = await createImageBitmap(blob)

const width = 600
const qrSize = 420

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

canvas.width=width
canvas.height=qrSize+330

// nền
ctx.fillStyle="#f3f3f3"
ctx.fillRect(0,0,width,canvas.height)

// BIDV
ctx.fillStyle="#0b6b5c"
ctx.font="bold 48px Arial"
ctx.textAlign="center"
ctx.fillText("BIDV",width/2,60)

// VIETQR
ctx.fillStyle="#e53935"
ctx.font="bold 42px Arial"
ctx.fillText("VIETQR",width/2,110)

// QR border
const x=(width-qrSize)/2
const y=130

ctx.fillStyle="#fff"
ctx.fillRect(x-10,y-10,qrSize+20,qrSize+20)

ctx.strokeStyle="#2b4c7e"
ctx.lineWidth=4
ctx.strokeRect(x-10,y-10,qrSize+20,qrSize+20)

// QR
ctx.drawImage(qrImg,x,y,qrSize,qrSize)

// napas + BIDV
let ty=y+qrSize+50

ctx.fillStyle="#2b4c7e"
ctx.font="bold 22px Arial"
ctx.fillText("napas 247",width/2-80,ty)

ctx.fillStyle="#999"
ctx.fillText("|",width/2,ty)

ctx.fillStyle="#0b6b5c"
ctx.fillText("BIDV",width/2+80,ty)

// NAME
ty+=50
ctx.fillStyle="#000"
ctx.font="bold 28px Arial"
ctx.fillText(item.name.toUpperCase(),width/2,ty)

// CLASS
ty+=35
ctx.font="22px Arial"
ctx.fillText("Lớp: "+item.class,width/2,ty)

// ACCOUNT
ty+=35
ctx.fillText("Số TK: "+item.AccountNumber,width/2,ty)

// AMOUNT
ty+=40
ctx.font="bold 26px Arial"
ctx.fillText(
"Số tiền: "+Number(item.Amount).toLocaleString()+" VND",
width/2,
ty
)

return new Promise(res=>canvas.toBlob(res,"image/png"))
}

// DOWNLOAD 1
async function downloadSingle(i){
const blob=await createStyledQR(qrImages[i])
saveAs(blob,qrImages[i].name+".png")
}

// DOWNLOAD CLASS
async function downloadClassQR(){
const selected=document.getElementById("classFilter").value
if(!selected){alert("Chọn lớp");return}

const zip=new JSZip()
let index=0
const concurrency=20

async function worker(){
while(index<qrImages.length){
const i=index++
const item=qrImages[i]
if(item.class!==selected) continue
const blob=await createStyledQR(item)
zip.file(item.name+".png",blob)
}
}

await Promise.all(Array(concurrency).fill().map(worker))
const content=await zip.generateAsync({type:"blob"})
saveAs(content,"QR_LOP_"+selected+".zip")
}

// DOWNLOAD ALL
async function downloadAll(){
const zip=new JSZip()
let index=0
const concurrency=20

async function worker(){
while(index<qrImages.length){
const i=index++
const item=qrImages[i]
const blob=await createStyledQR(item)
zip.file(item.name+".png",blob)
}
}

await Promise.all(Array(concurrency).fill().map(worker))
const content=await zip.generateAsync({type:"blob"})
saveAs(content,"QR_ALL.zip")
}

</script>

</body>
</html>
